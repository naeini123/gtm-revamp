<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liverpool Fan Shop - Cart</title>
    <link id="favicon" rel="icon" href="Liverpool-FC-80s-icon.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <!-- Google Tag Manager Should Go Here -->
</head>
<body>
    <!-- Google Tag Manager (noscript) should go here-->
    <header>
        <nav>
            <a class="nav-brand" href="index.html">
                <img src="Liverpool-FC-80s-icon.png" alt="LFC">
                Liverpool Fan Shop
            </a>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart <span class="nav-cart-badge" id="cart-count">0</span></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Your Cart</h1>
        <div class="cart-wrapper">
            <table id="cart-table">
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Price</th>
                        <th>Quantity</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="cart-body"></tbody>
            </table>
        </div>
        <div class="cart-total-section">
            <p>Total: $<span id="cart-total">0</span></p>
        </div>
        <button onclick="initiateCheckout()">Proceed to Checkout &rarr;</button>
    </main>
    <footer>
        &copy; 2025 <span>Liverpool Fan Shop</span> &mdash; GTM Demo Store
    </footer>

    <script src="script.js"></script>
</body>
</html>
